<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Ayushyam Orthopedic Hospital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
        <section class="page-header">
            <div class="container">
                <h1>Hospital Gallery</h1>
                <p>State-of-the-art facilities designed for your comfort.</p>
            </div>
        </section>

        <!-- ===== GALLERY ===== -->
        <section id="gallery" class="section">
            <div class="container">
                <div class="gallery-grid">
                    <div class="gallery-item gallery-large">
                        <img src="public/images/gallery/hospital-reception.jpg" alt="Hospital Reception" loading="lazy">
                        <div class="gallery-overlay"><span>Hospital Reception</span></div>
                    </div>
                    <div class="gallery-item">
                        <img src="public/images/gallery/operation-theatre.jpg" alt="Operation Theatre" loading="lazy">
                        <div class="gallery-overlay"><span>Operation Theatre</span></div>
                    </div>
                    <div class="gallery-item">
                        <img src="public/images/gallery/consultation-room.jpg" alt="Consultation Room" loading="lazy">
                        <div class="gallery-overlay"><span>Consultation Room</span></div>
                    </div>
                    <div class="gallery-item">
                        <img src="public/images/gallery/patient-room.jpg" alt="Patient Room" loading="lazy">
                        <div class="gallery-overlay"><span>Patient Room</span></div>
                    </div>
                    <div class="gallery-item">
                        <img src="public/images/gallery/physiotherapy.jpg" alt="Physiotherapy Center" loading="lazy">
                        <div class="gallery-overlay"><span>Physiotherapy Center</span></div>
                    </div>
                    <div class="gallery-item gallery-large">
                        <img src="public/images/gallery/diagnostic-lab.jpg" alt="Diagnostic Lab" loading="lazy">
                        <div class="gallery-overlay"><span>Diagnostic Lab</span></div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script>window.AYUSHYAM_PATH_DEPTH = 0;</script>
    <script src="js/components.js"></script>
</body>
</html>
